<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:700px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.question{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.option{
display:block;
background:#f1f1f1;
padding:12px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
}

.option input{
margin-right:10px;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
color:#1565C0;
}

.back{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
font-weight:bold;
color:#1565C0;
}
</style>

</head>

<body>

<header>
📝 BKTech Quiz
</header>

<div class="container">

<div class="question">
1. CPU का पूरा नाम क्या है?
</div>

<label class="option">
<input type="radio" name="q1" value="0">
Central Process Unit
</label>

<label class="option">
<input type="radio" name="q1" value="1">
Central Processing Unit
</label>

<label class="option">
<input type="radio" name="q1" value="0">
Computer Processing Unit
</label>

<label class="option">
<input type="radio" name="q1" value="0">
Central Power Unit
</label>

<button onclick="checkQuiz()">
Submit Quiz
</button>

<div id="result"></div>

<a href="courses.html" class="back">
⬅ Back to Courses
</a>

</div>

<script src="quiz.js"></script>

</body>
</html>
