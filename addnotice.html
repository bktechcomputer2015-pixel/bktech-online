<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Notice - BKTech</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:150px;
resize:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
font-weight:bold;
color:#1565C0;
}
</style>
</head>

<body>

<header>
📢 Add Notice
</header>

<div class="container">

<input type="text" id="title" placeholder="Notice Title">

<textarea id="message" placeholder="Write Notice Here..."></textarea>

<button onclick="addNotice()">
Publish Notice
</button>

<a href="admin.html" class="back">
⬅ Back to Admin
</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

function addNotice(){

const title=document.getElementById("title").value.trim();
const message=document.getElementById("message").value.trim();

if(title=="" || message==""){

alert("Please fill all fields.");

return;

}

db.collection("notices").add({

title:title,
message:message,
date:new Date().toLocaleDateString("en-IN"),
createdAt:firebase.firestore.FieldValue.serverTimestamp()

})

.then(function(){

alert("✅ Notice Published Successfully");

document.getElementById("title").value="";
document.getElementById("message").value="";

})

.catch(function(error){

alert(error.message);

});

}

</script>

</body>
</html>
