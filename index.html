<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BKTech Online Classes</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565C0">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.banner{
background:#0D47A1;
color:white;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
}

.banner h2{
margin:0;
}

.btn{
display:inline-block;
margin:10px 5px;
background:white;
color:#1565C0;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.15);
font-size:18px;
font-weight:bold;
color:black;
transition:.3s;
}

.card:hover{
background:#1565C0;
color:white;
}

.grid a{
text-decoration:none;
}

footer{
margin-top:20px;
background:#1565C0;
color:white;
text-align:center;
padding:15px;
}
</style>

</head>

<body>

<header>
BKTech Online Classes
</header>

<div class="banner">
<h2>Welcome Students</h2>
<p>Learn Anytime, Anywhere</p>

<a class="btn" href="login.html">Login</a>
<a class="btn" href="signup.html">Sign Up</a>

</div>

<div class="grid">

<a href="courses.html">
<div class="card">📚 Courses</div>
</a>

<a href="live.html">
<div class="card">🎥 Live Classes</div>
</a>

<a href="notes.html">
<div class="card">📄 Notes</div>
</a>

<a href="quiz.html">
<div class="card">📝 Quiz</div>
</a>

<a href="notice.html">
<div class="card">📢 Notices</div>
</a>

<a href="profile.html">
<div class="card">👤 Profile</div>
</a>

</div>

<footer>
© 2026 BKTech Online Classes
</footer>

if ('serviceWorker' in navigator) {
window.addEventListener('load', function () {
navigator.serviceWorker.register('./sw.js');
});
}
</script>

</html>
