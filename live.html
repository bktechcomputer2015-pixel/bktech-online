<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Live Classes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
max-width:700px;
margin:20px auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

.status{
display:inline-block;
padding:8px 16px;
border-radius:20px;
background:red;
color:white;
font-weight:bold;
margin-bottom:15px;
}

.live{
background:green;
}

h2{
color:#1565C0;
margin:10px 0;
}

p{
margin:8px 0;
font-size:17px;
color:#444;
}

.btn{
display:block;
width:100%;
padding:14px;
margin-top:20px;
background:#1565C0;
color:white;
text-decoration:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.back{
background:#4CAF50;
}
</style>

</head>

<body>

<header>
🎥 BKTech Live Classes
</header>

<div class="container">

<div class="card">

<div id="status" class="status">
OFFLINE
</div>

<h2 id="classTitle">
No Live Class
</h2>

<p>
👨‍🏫 Teacher:
<span id="teacher">Not Available</span>
</p>

<p>
📅 Date:
<span id="date">--/--/----</span>
</p>

<p>
⏰ Time:
<span id="time">--:--</span>
</p>

<a id="joinBtn"
href="#"
target="_blank"
class="btn">
🚀 Join Live Class
</a>

<a href="profile.html" class="btn back">
⬅ Back
</a>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

db.collection("liveclass")
.doc("current")
.onSnapshot(function(doc){

if(!doc.exists) return;

const data=doc.data();

document.getElementById("classTitle").innerHTML=data.title;
document.getElementById("teacher").innerHTML=data.teacher;
document.getElementById("date").innerHTML=data.date;
document.getElementById("time").innerHTML=data.time;
document.getElementById("joinBtn").href=data.link;

if(data.status=="Live"){

document.getElementById("status").innerHTML="🔴 LIVE";
document.getElementById("status").classList.add("live");

}else{

document.getElementById("status").innerHTML="OFFLINE";

}

});

</script>

</body>
</html>
