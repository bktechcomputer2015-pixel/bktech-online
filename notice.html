<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Notice Board</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:95%;
max-width:900px;
margin:20px auto;
}

.notice{
background:#fff;
padding:20px;
margin-bottom:15px;
border-left:6px solid #1565C0;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.notice h3{
color:#1565C0;
margin-bottom:10px;
}

.notice p{
color:#444;
line-height:24px;
}

.date{
margin-top:10px;
font-size:14px;
color:#777;
}

.back{
display:inline-block;
margin:15px;
text-decoration:none;
font-weight:bold;
color:#1565C0;
}

.loading{
text-align:center;
font-size:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
📢 BKTech Notice Board
</header>

<a href="index.html" class="back">⬅ Back to Home</a>

<div class="container" id="noticeList">

<div class="loading">
Loading Notices...
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

db.collection("notices")
.orderBy("createdAt","desc")
.onSnapshot(function(snapshot){

const list=document.getElementById("noticeList");

list.innerHTML="";

if(snapshot.empty){

list.innerHTML="<div class='loading'>No Notice Available</div>";

return;

}

snapshot.forEach(function(doc){

const data=doc.data();

list.innerHTML+=`

<div class="notice">

<h3>${data.title}</h3>

<p>${data.message}</p>

<div class="date">

📅 ${data.date || ""}

</div>

</div>

`;

});

});

</script>

</body>
</html>
