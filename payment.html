<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Payment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
width:90%;
max-width:420px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#1565C0;
margin-bottom:15px;
}

.qr{
display:block;
width:220px;
height:220px;
margin:15px auto;
border:2px solid #1565C0;
border-radius:10px;
object-fit:cover;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>
</head>

<body>

<header>
💳 BKTech Payment
</header>

<div class="container">

<h2>Scan & Pay</h2>

<img src="images/qr.jpg" class="qr">

<input type="text" id="name" placeholder="Student Name">

<input type="number" id="amount" placeholder="Amount">

<input type="text" id="utr" placeholder="UTR Number">

<input type="file" id="screenshot">

<button onclick="submitPayment()">Submit Payment</button>

<a href="profile.html" class="back">⬅ Back to Profile</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="payment.js"></script>

</body>
</html>
