<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Online Courses</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:25px;
font-weight:bold;
}

.back{
display:inline-block;
margin:15px;
text-decoration:none;
font-weight:bold;
color:#1565C0;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding-bottom:30px;
}

.course{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.course img{
width:100%;
height:180px;
object-fit:cover;
}

.content{
padding:15px;
}

.content h3{
color:#1565C0;
margin-bottom:10px;
}

.content p{
color:#444;
margin-bottom:12px;
line-height:22px;
}

.btn{
display:block;
text-align:center;
padding:12px;
margin-top:10px;
background:#1565C0;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.loading{
text-align:center;
font-size:20px;
padding:30px;
grid-column:1/-1;
}
</style>

</head>

<body>

<header>
📚 BKTech Online Courses
</header>

<a href="profile.html" class="back">⬅ Back to Profile</a>

<div class="container" id="courseList">

<div class="loading">
Loading Courses...
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

db.collection("courses").onSnapshot(function(snapshot){

const list=document.getElementById("courseList");

list.innerHTML="";

if(snapshot.empty){

list.innerHTML="<div class='loading'>No Courses Available</div>";

return;

}

snapshot.forEach(function(doc){

const data=doc.data();

list.innerHTML+=`

<div class="course">

<img src="${data.courseImage || 'https://via.placeholder.com/400x200?text=BKTech+Course'}">

<div class="content">

<h3>${data.courseName}</h3>

<p>${data.description || "No Description Available"}</p>

<a class="btn"
href="videos.html?video=${encodeURIComponent(data.videoLink)}&title=${encodeURIComponent(data.courseName)}&desc=${encodeURIComponent(data.description || '')}&pdf=${encodeURIComponent(data.pdfLink || '')}">
▶ Watch Video
</a>

<a class="btn"
href="${data.pdfLink || '#'}"
target="_blank">
📄 Download PDF
</a>

</div>

</div>

`;

});

});

</script>

</body>
</html>
