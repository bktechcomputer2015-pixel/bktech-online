<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech - Add Live Class</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:600px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0D47A1;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
font-weight:bold;
color:#1565C0;
}
</style>

</head>

<body>

<header>🎥 Add Live Class</header>

<div class="container">

<input type="text" id="title" placeholder="Class Title">

<input type="text" id="teacher" placeholder="Teacher Name">

<input type="date" id="date">

<input type="time" id="time">

<input type="url" id="link" placeholder="YouTube Live / Google Meet Link">

<select id="status">
<option value="Offline">Offline</option>
<option value="Live">🔴 Live</option>
</select>

<button onclick="saveLiveClass()">
Save Live Class
</button>

<a href="admin.html" class="back">⬅ Back to Admin</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

function saveLiveClass(){

const title=document.getElementById("title").value.trim();
const teacher=document.getElementById("teacher").value.trim();
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;
const link=document.getElementById("link").value.trim();
const status=document.getElementById("status").value;

if(title=="" || teacher=="" || date=="" || time=="" || link==""){

alert("Please fill all fields.");

return;

}

db.collection("liveclass").doc("current").set({

title:title,
teacher:teacher,
date:date,
time:time,
link:link,
status:status,
updatedAt:firebase.firestore.FieldValue.serverTimestamp()

})

.then(function(){

alert("✅ Live Class Saved Successfully!");

})

.catch(function(error){

alert(error.message);

});

}

</script>

</body>
</html>
