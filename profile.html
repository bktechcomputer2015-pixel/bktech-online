<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Student Profile</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.profile{
width:90%;
max-width:400px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #1565C0;
}

.profile h2{
color:#1565C0;
margin:15px 0;
}

.profile p{
font-size:17px;
color:#444;
margin:10px 0;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
background:#1565C0;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
box-sizing:border-box;
}

.logout{
background:red;
}
</style>
</head>

<body>

<header>
👤 Student Profile
</header>

<div class="profile">

<img src="https://via.placeholder.com/120" alt="Profile">

<h2 id="name">Loading...</h2>

<p>📧 Email: <span id="email"></span></p>

<p>📱 Mobile: <span id="mobile"></span></p>

<p>🎓 BKTech Online Classes</p>

<a href="courses.html" class="btn">My Courses</a>

<a href="quiz.html" class="btn">Quiz</a>

<a href="#" class="btn logout" onclick="logout()">Logout</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>

auth.onAuthStateChanged(function(user){

if(user){

db.collection("students").doc(user.uid).get()
.then(function(doc){

if(doc.exists){

const data = doc.data();

document.getElementById("name").innerHTML = data.name;
document.getElementById("email").innerHTML = data.email;
document.getElementById("mobile").innerHTML = data.mobile;

}else{

alert("Student data not found");

}

});

}else{

window.location.href="login.html";

}

});

function logout(){

auth.signOut().then(function(){

window.location.href="login.html";

});

}

</script>

</body>
</html>
