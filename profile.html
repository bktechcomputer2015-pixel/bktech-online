<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKTech Student Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.profile{
width:90%;
max-width:420px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
text-align:center;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #1565C0;
margin-bottom:15px;
}

.profile h2{
color:#1565C0;
margin-bottom:10px;
}

.profile p{
margin:8px 0;
font-size:16px;
color:#444;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
background:#1565C0;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
text-align:center;
}

.logout{
background:#E53935;
}

.logout:hover{
background:#C62828;
}
</style>
</head>

<body>

<header>
👨‍🎓 BKTech Student Dashboard
</header>

<div class="profile">

<img src="https://via.placeholder.com/120" alt="Student">

<h2 id="name">Loading...</h2>

<p>📧 <span id="email"></span></p>

<p>📱 <span id="mobile"></span></p>

<p>🎓 Welcome to BKTech Online Classes</p>

<a href="courses.html" class="btn">📚 My Courses</a>

<a href="quiz.html" class="btn">📝 Quiz</a>

<a href="notice.html" class="btn">📢 Notices</a>

<a href="live.html" class="btn">🎥 Live Classes</a>

<a href="certificate.html" class="btn">🎓 Certificate</a>

<a href="payments.html" class="btn">💳 Payments</a>

<a href="notes.html" class="btn">📄 Notes</a>

<a href="#" class="btn logout" onclick="logout()">🚪 Logout</a>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>auth.onAuthStateChanged(function(user){

if(user){

db.collection("students").doc(user.uid).get()

.then(function(doc){

if(doc.exists){

const data = doc.data();

document.getElementById("name").innerHTML = data.name;

document.getElementById("email").innerHTML = data.email;

document.getElementById("mobile").innerHTML = data.mobile;

}else{

alert("Student data not found.");

}

})

.catch(function(error){

alert(error.message);

});

}else{

window.location.href="login.html";

}

});

function logout(){

auth.signOut()

.then(function(){

alert("Logout Successful");

window.location.href="login.html";

})

.catch(function(error){

alert(error.message);

});

}

</script>

</body>
</html>
